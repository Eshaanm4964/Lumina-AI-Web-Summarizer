<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumina AI Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --border: #334155;
            --radius: 12px;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Simulation of the extension popup */
        .extension-popup {
            width: 380px;
            height: 500px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        header { text-align: center; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-icon { font-size: 24px; }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .tagline { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .content {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            padding: 16px;
        }

        .summary-section { margin-bottom: 24px; }
        .summary-heading {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #a5b4fc;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }
        .summary-body { padding-left: 13px; font-size: 14px; line-height: 1.6; color: #e2e8f0; }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #placeholder { color: var(--text-muted); text-align: center; font-size: 14px; margin-top: 50px; }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: var(--primary);
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="extension-popup">
        <header>
            <div class="logo">
                <span class="logo-icon">🔮</span>
                <h1>Lumina AI</h1>
            </div>
            <p class="tagline">Intelligent Real-Time Summaries</p>
        </header>

        <div class="content" id="display">
            <div id="placeholder">Click summarize to see the magic...</div>
        </div>

        <footer>
            <button class="btn" id="start-btn">Summarize Page</button>
        </footer>
    </div>

    <script>
        const content = [
            "**EXECUTIVE SUMMARY**\nLumina AI is a peak-performance browser utility designed to distill complex web content into strategic intelligence using Llama 3 and Groq's low-latency hardware.",
            "\n\n**KEY HIGHLIGHTS**\n* Real-time streaming generation for instant feedback.\n* High-fidelity structured markdown formatting.\n* Native dark-mode architecture for professional use.",
            "\n\n**STRATEGIC INSIGHT**\nBy bridging the gap between raw data and actionable insights, Lumina AI serves as a critical multiplier for knowledge workers in fast-paced environments."
        ];

        const display = document.getElementById('display');
        const btn = document.getElementById('start-btn');

        btn.onclick = () => {
            btn.innerText = "Analyzing...";
            btn.disabled = true;
            display.innerHTML = "";
            let i = 0;
            let currentText = "";
            
            function type() {
                if (i < content.join('').length) {
                    currentText += content.join('')[i];
                    display.innerHTML = format(currentText) + '<span class="cursor"></span>';
                    i++;
                    setTimeout(type, 15);
                } else {
                    btn.innerText = "Summary Complete";
                    document.querySelector('.cursor').remove();
                }
            }

            setTimeout(type, 1000);
        };

        function format(text) {
            return text.split('\n').map(line => {
                if (line.includes('EXECUTIVE SUMMARY') || line.includes('KEY HIGHLIGHTS') || line.includes('STRATEGIC INSIGHT')) {
                    return `<div class="summary-section"><span class="summary-heading">${line.replace(/[*]/g, '')}</span><div class="summary-body">`;
                }
                if (line.startsWith('* ')) return `<li>${line.substring(2)}</li>`;
                return `<p>${line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')}</p>`;
            }).join('');
        }
    </script>
</body>
</html>
